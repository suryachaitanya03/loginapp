<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Luminare Store - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { background: #050505; color: white; font-family: 'Poppins', sans-serif; padding: 20px; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px; border-bottom: 1px solid rgba(16, 185, 129, 0.2); }
        .logo { color: #10b981; font-weight: 700; font-size: 24px; }
        .search-box { background: rgba(255,255,255,0.05); border: 1px solid #10b981; padding: 10px; border-radius: 10px; color: white; width: 300px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 30px; }
        .card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); }
        .price { color: #10b981; font-weight: 600; }
        .buy-btn { background: #10b981; width: 100%; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>
    <header>
        <div class="logo">LUMINARE</div>
        <input type="text" id="search" class="search-box" placeholder="Search certifications...">
        <a href="index.html" style="color: #9ca3af; text-decoration: none;">Logout</a>
    </header>

    <div class="grid" id="productGrid">
        <div class="card" data-cat="Tech">
            <h3>Python Mastery</h3>
            <p class="price">$29.99</p>
            <button class="buy-btn">Enroll</button>
        </div>
        <div class="card" data-cat="AI">
            <h3>GenAI Foundations</h3>
            <p class="price">$59.99</p>
            <button class="buy-btn">Enroll</button>
        </div>
    </div>

    <script>
        document.getElementById('search').addEventListener('input', function(e) {
            const term = e.target.value.toLowerCase();
            document.querySelectorAll('.card').forEach(card => {
                const title = card.querySelector('h3').innerText.toLowerCase();
                card.style.display = title.includes(term) ? "block" : "none";
            });
        });
    </script>
</body>
</html>
