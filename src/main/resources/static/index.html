<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suryas Login Page</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        font-family:'Poppins',sans-serif;
        background: linear-gradient(135deg, #050505 0%, #0a0a0a 50%, #011c14 100%);
        overflow:hidden;
        position:relative;
    }

    /* Background Emerald Glows */
    body::before,
    body::after{
        content:'';
        position:absolute;
        width:400px;
        height:400px;
        border-radius:50%;
        filter:blur(130px);
        opacity:0.45;
        z-index:0;
    }

    body::before{
        background:#059669; 
        top:-100px;
        left:-100px;
    }

    body::after{
        background:#10b981; 
        bottom:-100px;
        right:-100px;
    }

    .login-container{
        position:relative;
        z-index:1;
        width:380px;
        padding:45px 35px;
        border-radius:24px;
        background:rgba(20, 20, 20, 0.4); 
        backdrop-filter:blur(20px);
        border:1px solid rgba(16, 185, 129, 0.15);
        box-shadow:
            0 8px 32px rgba(0,0,0,0.5),
            inset 0 0 10px rgba(16, 185, 129, 0.05);
        animation:fadeIn 1s ease;
    }

    @keyframes fadeIn{
        from{ opacity:0; transform:translateY(20px); }
        to{ opacity:1; transform:translateY(0); }
    }

    .logo{
        text-align:center;
        margin-bottom:25px;
    }

    .logo h1{
        color:#10b981; 
        font-size:32px;
        font-weight:700;
        letter-spacing:2px;
        text-transform: uppercase;
    }

    .logo p{
        color:#a7f3d0; 
        margin-top:5px;
        font-size:14px;
    }

    .input-group{
        margin-bottom:22px;
    }

    .input-group label{
        display:block;
        margin-bottom:8px;
        color:#d1fae5;
        font-size:14px;
        font-weight:500;
    }

    .input-group input{
        width:100%;
        padding:14px 16px;
        border:none;
        border-radius:14px;
        background:rgba(0, 0, 0, 0.4); 
        color:white;
        font-size:15px;
        outline:none;
        transition:0.3s;
        border:1px solid rgba(255,255,255,0.05);
    }

    .input-group input:focus{
        border:1px solid #10b981;
        box-shadow:0 0 15px rgba(16,185,129,0.3);
        background:rgba(0, 0, 0, 0.6);
    }

    .options{
        display:flex;
        justify-content:space-between;
        align-items:center;
        margin-bottom:25px;
        font-size:13px;
    }

    .options label{
        color:#a7f3d0;
        display: flex;
        align-items: center;
        gap: 6px;
        cursor: pointer;
    }

    .options input[type="checkbox"] {
        accent-color: #10b981;
    }

    .options a{
        color:#34d399; 
        text-decoration:none;
        transition:0.3s;
    }

    .login-btn{
        width:100%;
        padding:14px;
        border:none;
        border-radius:14px;
        background:linear-gradient(135deg,#059669,#10b981);
        color:#000000; 
        font-size:16px;
        font-weight:700;
        letter-spacing: 1px;
        cursor:pointer;
        transition:0.4s;
    }

    .login-btn:hover{
        transform:translateY(-2px) scale(1.02);
        box-shadow:0 8px 20px rgba(16,185,129,0.4);
    }

    .footer-text{
        text-align:center;
        margin-top:22px;
        color:#9ca3af;
        font-size:13px;
    }

    .footer-text a{
        color:#34d399;
        text-decoration:none;
        font-weight:600;
        margin-left: 4px;
        transition: 0.3s;
    }
</style>
</head>

<body>

<div class="login-container">
    <div class="logo">
        <h1>LOGIN</h1>
        <p>Welcome back! Please login to continue.</p>
    </div>

    <form id="loginForm">
        <div class="input-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Enter your username" required>
        </div>

        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" required>
        </div>

        <div class="options">
            <label><input type="checkbox"> Remember Me</label>
            <a href="#">Forgot Password?</a>
        </div>

        <button type="submit" class="login-btn">LOGIN</button>
    </form>

    <div class="footer-text">
        Don't have an account? <a href="#">Create Account</a>
    </div>
</div>

<script>
    const loginForm = document.querySelector('#loginForm');
    const loginBtn = document.querySelector('.login-btn');

    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const username = document.querySelector('#username').value.trim();
        const password = document.querySelector('#password').value.trim();

        // UI feedback
        loginBtn.disabled = true;
        loginBtn.textContent = 'LOGGING IN...';

        try {
            const response = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const data = await response.json();

            if (response.ok) {
                // REDIRECT TO DASHBOARD ON SUCCESS
                window.location.href = "dashboard.html"; 
            } else {
                alert(data.message || "Invalid credentials. Please try again.");
            }
        } catch (error) {
            alert("Connection error. Ensure your Spring Boot server is running on port 8080.");
        } finally {
            loginBtn.disabled = false;
            loginBtn.textContent = 'LOGIN';
        }
    });
</script>
</body>
</html>
